        svg {
            width: 100%;
            height: 100%;

        path {
            fill: transparent;
            /* Start with no fill */
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: fill 1.2s ease;
        }

        .no-fill {
            fill: transparent !important;
        }

        .filled {
            fill: white;
        }

    <script>

        const paths = document.querySelectorAll("svg path");

        let delay = 0;
        let totalDuration = 0;

        paths.forEach((path) => {

            const length = path.getTotalLength();

            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length;

            path.style.animation = `draw 2s ease forwards ${delay}s`;

            delay += 0.15;
            totalDuration = delay + 2;
        });

        /* After drawing finishes → fill closed shapes */
        setTimeout(() => {
            paths.forEach(path => {
                if (!path.classList.contains("no-fill")) {
                    path.classList.add("filled");
                }
            });
        }, totalDuration * 1000);
    </script>

    <style>
        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
